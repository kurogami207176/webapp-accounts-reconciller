AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ECS Express Mode service for webapp-accounts-reconciller.
  Automatically provisions the ALB, target group, security groups,
  auto-scaling, and CloudWatch logs.

  Depends on:
    - webapp-environment-setup network stack  (VPC, subnets, security groups)
    - cf/ecr.yml                              (ECR repository)
    - webapp-environment-setup database stack (Aurora — optional)
    - cf/cognito.yml                          (Cognito — optional)

Parameters:
  AppName:
    Type: String
    Default: webapp-accounts-reconciller

  Environment:
    Type: String
    Default: production
    AllowedValues: [staging, production]

  # ── Shared infrastructure stack names ──────────────────────────────────────
  # The network and database stacks live in webapp-environment-setup and are
  # shared across apps. The AppName there is "webapp" and the Env key is "Env"
  # (not "Environment"), so exports follow the pattern: webapp-<env>-<resource>.
  NetworkStackName:
    Type: String
    Description: >
      Name of the deployed webapp-environment-setup network CloudFormation stack.
      Exports must follow the pattern: <NetworkStackName>-<Resource>.
      e.g. "webapp-staging-network" → exports "webapp-staging-network-VpcId".
      Defaults match the webapp-environment-setup naming convention.
    Default: ""

  # Convenience: if NetworkStackName is left blank we derive the export prefix
  # from the shared convention: webapp-<Environment>
  # Override NetworkStackName to point at a differently-named stack.

  DatabaseStackName:
    Type: String
    Default: ""
    Description: >
      Name of the deployed webapp-environment-setup database CloudFormation stack.
      Leave empty to run without a database — DB_SECRET_ARN will not be set.
      e.g. "webapp-staging-database"

  CognitoStackName:
    Type: String
    Default: ""
    Description: >
      Name of the deployed Cognito CloudFormation stack (cf/cognito.yml).
      Leave empty to run without authentication — auth routes will return 503.

  EcrStackName:
    Type: String
    Default: webapp-accounts-reconciller-ecr
    Description: Name of the deployed ECR CloudFormation stack.

  S3StackName:
    Type: String
    Default: ""
    Description: >
      Name of the deployed S3 CloudFormation stack (cf/s3.yml).
      Leave empty to run without S3 — S3_BUCKET_NAME will not be set.
      e.g. "webapp-accounts-reconciller-s3-production"

  SecretKeyArn:
    Type: String
    Default: ""
    Description: >
      ARN of a Secrets Manager secret containing the Flask SECRET_KEY value.
      Used to sign session cookies. Create once with:
        aws secretsmanager create-secret --name /<app>/<env>/flask-secret-key \
          --secret-string "$(openssl rand -hex 32)"

  ImageTag:
    Type: String
    Default: latest
    Description: Docker image tag to deploy.

  ContainerPort:
    Type: Number
    Default: 3000

  TaskCpu:
    Type: String
    Default: "256"
    AllowedValues: ["256", "512", "1024", "2048", "4096"]

  TaskMemory:
    Type: String
    Default: "512"
    AllowedValues: ["512", "1024", "2048", "4096", "8192"]

  MinTaskCount:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 10

  MaxTaskCount:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10

# ─────────────────────────────────────────────────────────────────────────────
# Conditions
# ─────────────────────────────────────────────────────────────────────────────
Conditions:
  HasDatabase:        !Not [!Equals [!Ref DatabaseStackName, ""]]
  HasCognito:         !Not [!Equals [!Ref CognitoStackName, ""]]
  HasSecretKey:       !Not [!Equals [!Ref SecretKeyArn, ""]]
  HasNetworkStackName: !Not [!Equals [!Ref NetworkStackName, ""]]
  HasS3:              !Not [!Equals [!Ref S3StackName, ""]]

# ─────────────────────────────────────────────────────────────────────────────
# Resources
# ─────────────────────────────────────────────────────────────────────────────
Resources:

  # ── IAM — ECS task execution role (pull image, write logs) ─────────────────
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # Allow execution role to inject SECRET_KEY at container launch
  ExecutionRoleSecretKeyPolicy:
    Type: AWS::IAM::Policy
    Condition: HasSecretKey
    Properties:
      PolicyName: !Sub "${AppName}-${Environment}-exec-fetch-secret-key"
      Roles:
        - !Ref TaskExecutionRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: FetchSecretKey
            Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource: !Ref SecretKeyArn

  # ── IAM — ECS task role (runtime permissions for the app) ──────────────────
  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # Allow the task role to read the DB secret at runtime
  TaskRoleDbPolicy:
    Type: AWS::IAM::Policy
    Condition: HasDatabase
    Properties:
      PolicyName: !Sub "${AppName}-${Environment}-read-db-secret"
      Roles:
        - !Ref TaskRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ReadDbSecret
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource:
              Fn::ImportValue: !Sub "${DatabaseStackName}-DbAppSecretArn"

  # Allow the task role to read the Flask SECRET_KEY
  TaskRoleSecretKeyPolicy:
    Type: AWS::IAM::Policy
    Condition: HasSecretKey
    Properties:
      PolicyName: !Sub "${AppName}-${Environment}-read-secret-key"
      Roles:
        - !Ref TaskRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ReadSecretKey
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
              - secretsmanager:DescribeSecret
            Resource: !Ref SecretKeyArn

  # Allow the task role to read/write the reconciler S3 bucket and trigger ECS tasks
  TaskRoleS3Policy:
    Type: AWS::IAM::Policy
    Condition: HasS3
    Properties:
      PolicyName: !Sub "${AppName}-${Environment}-s3-reconciler"
      Roles:
        - !Ref TaskRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3BucketList
            Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource:
              Fn::ImportValue: !Sub "${S3StackName}-BucketArn"
          - Sid: S3ObjectReadWrite
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:GetObjectVersion
            Resource: !Sub
              - "${BucketArn}/*"
              - BucketArn:
                  Fn::ImportValue: !Sub "${S3StackName}-BucketArn"
          # Allow ECS tasks to trigger one-off parser/matcher tasks (same task def)
          - Sid: EcsRunTask
            Effect: Allow
            Action:
              - ecs:RunTask
              - ecs:DescribeTasks
              - ecs:StopTask
            Resource: "*"
            Condition:
              ArnEquals:
                "ecs:cluster": !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${AppName}-${Environment}"
          - Sid: PassRoleToEcs
            Effect: Allow
            Action: iam:PassRole
            Resource:
              - !GetAtt TaskRole.Arn
              - !GetAtt TaskExecutionRole.Arn

  # ── IAM — Infrastructure role (ECS Express manages ALB, SGs, auto-scaling) ─
  InfrastructureRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AppName}-${Environment}-ecs-infrastructure-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRoleforExpressGatewayServices
      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

  # ── ECS Express Gateway Service ─────────────────────────────────────────────
  # Imports VPC, private subnets, and the app-tier security group from the
  # shared webapp-environment-setup network stack.
  #
  # Export name convention from that stack:
  #   webapp-<env>-VpcId
  #   webapp-<env>-PrivateSubnet1Id / PrivateSubnet2Id
  #   webapp-<env>-AppSecurityGroupId   (allows traffic from ALB only)
  # ─────────────────────────────────────────────────────────────────────────────
  ExpressService:
    Type: AWS::ECS::ExpressGatewayService
    Properties:
      ServiceName: !Sub "${AppName}-${Environment}"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      InfrastructureRoleArn: !GetAtt InfrastructureRole.Arn
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      HealthCheckPath: /health

      # Place tasks in the private subnets of the shared VPC.
      # ECS Express will attach to the shared ALB security group automatically.
      NetworkConfiguration:
        Subnets:
          - Fn::ImportValue: !If
              - HasNetworkStackName
              - !Sub "${NetworkStackName}-PrivateSubnet1Id"
              - !Sub "webapp-${Environment}-PrivateSubnet1Id"
          - Fn::ImportValue: !If
              - HasNetworkStackName
              - !Sub "${NetworkStackName}-PrivateSubnet2Id"
              - !Sub "webapp-${Environment}-PrivateSubnet2Id"
        SecurityGroups:
          - Fn::ImportValue: !If
              - HasNetworkStackName
              - !Sub "${NetworkStackName}-AppSecurityGroupId"
              - !Sub "webapp-${Environment}-AppSecurityGroupId"

      PrimaryContainer:
        Image: !Sub
          - "${Uri}:${Tag}"
          - Uri:
              Fn::ImportValue: !Sub "${EcrStackName}-RepositoryUri"
            Tag: !Ref ImageTag
        ContainerPort: !Ref ContainerPort
        Environment:
          - Name: PORT
            Value: !Sub "${ContainerPort}"
          - Name: ENVIRONMENT
            Value: !Ref Environment
          - Name: PYTHONDONTWRITEBYTECODE
            Value: "1"
          - !If
            - HasDatabase
            - Name: DB_SECRET_ARN
              Value:
                Fn::ImportValue: !Sub "${DatabaseStackName}-DbAppSecretArn"
            - !Ref AWS::NoValue
          - !If
            - HasS3
            - Name: S3_BUCKET_NAME
              Value:
                Fn::ImportValue: !Sub "${S3StackName}-BucketName"
            - !Ref AWS::NoValue
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - !If
            - HasCognito
            - Name: COGNITO_REGION
              Value: !Ref AWS::Region
            - !Ref AWS::NoValue
          - !If
            - HasCognito
            - Name: COGNITO_USER_POOL_ID
              Value:
                Fn::ImportValue: !Sub "${CognitoStackName}-UserPoolId"
            - !Ref AWS::NoValue
          - !If
            - HasCognito
            - Name: COGNITO_WEB_CLIENT_ID
              Value:
                Fn::ImportValue: !Sub "${CognitoStackName}-WebClientId"
            - !Ref AWS::NoValue
          - !If
            - HasCognito
            - Name: COGNITO_MOBILE_CLIENT_ID
              Value:
                Fn::ImportValue: !Sub "${CognitoStackName}-MobileClientId"
            - !Ref AWS::NoValue
          - !If
            - HasCognito
            - Name: COGNITO_HOSTED_UI_URL
              Value:
                Fn::ImportValue: !Sub "${CognitoStackName}-HostedUiBaseUrl"
            - !Ref AWS::NoValue
        Secrets:
          - !If
            - HasSecretKey
            - Name: SECRET_KEY
              ValueFrom: !Ref SecretKeyArn
            - !Ref AWS::NoValue

      ScalingTarget:
        MinTaskCount: !Ref MinTaskCount
        MaxTaskCount: !Ref MaxTaskCount

      Tags:
        - Key: AppName
          Value: !Ref AppName
        - Key: Environment
          Value: !Ref Environment

# ─────────────────────────────────────────────────────────────────────────────
# Outputs
# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  ServiceArn:
    Value: !GetAtt ExpressService.ServiceArn
    Export:
      Name: !Sub "${AWS::StackName}-ServiceArn"

  AlbArn:
    Value: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.LoadBalancerArn
    Export:
      Name: !Sub "${AWS::StackName}-AlbArn"

  AlbDnsName:
    Value: !GetAtt ExpressService.Endpoint
    Export:
      Name: !Sub "${AWS::StackName}-AlbDnsName"

  TargetGroupArn:
    Value: !Select
      - 0
      - !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.TargetGroupArns
    Export:
      Name: !Sub "${AWS::StackName}-TargetGroupArn"

  ListenerArn:
    Value: !GetAtt ExpressService.ECSManagedResourceArns.IngressPath.ListenerArn
    Export:
      Name: !Sub "${AWS::StackName}-ListenerArn"
