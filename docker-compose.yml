# Local development stack for webapp-accounts-reconciller.
#
# Services:
#   db        — PostgreSQL 16 (matches Aurora Postgres 16 in production)
#   localstack — AWS S3 emulation (no real AWS credentials needed locally)
#   migrate   — One-off Alembic migration runner (run: docker compose run --rm migrate)
#   app       — Flask dev server with hot reload
#
# Usage:
#   cp .env.example .env
#   docker compose up -d db localstack
#   docker compose run --rm migrate
#   docker compose up app
#
# Then visit: http://localhost:3000

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: appdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── LocalStack (S3) ─────────────────────────────────────────────────────────
  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-southeast-2
      AWS_DEFAULT_REGION: ap-southeast-2
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Alembic migrate (one-off) ────────────────────────────────────────────────
  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: base
    command: ["python", "-m", "alembic", "upgrade", "head"]
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/appdb
    depends_on:
      db:
        condition: service_healthy
    profiles: ["tools"]

  # ── Flask app ────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: development
    command: ["flask", "--app", "app:app", "run", "--host=0.0.0.0", "--port=3000", "--debug"]
    working_dir: /app
    volumes:
      - ./app:/app
    ports:
      - "3000:3000"
    environment:
      ENVIRONMENT: development
      FLASK_APP: app:app
      FLASK_DEBUG: "1"
      PORT: "3000"
      # Database
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/appdb
      # S3 via LocalStack
      S3_BUCKET_NAME: local-reconciler
      AWS_ENDPOINT_URL: http://localstack:4566
      AWS_DEFAULT_REGION: ap-southeast-2
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      # Cognito — set these in .env if you want real auth
      COGNITO_REGION: "${COGNITO_REGION:-ap-southeast-2}"
      COGNITO_USER_POOL_ID: "${COGNITO_USER_POOL_ID:-}"
      COGNITO_WEB_CLIENT_ID: "${COGNITO_WEB_CLIENT_ID:-}"
      COGNITO_MOBILE_CLIENT_ID: "${COGNITO_MOBILE_CLIENT_ID:-}"
      COGNITO_HOSTED_UI_URL: "${COGNITO_HOSTED_UI_URL:-}"
      SECRET_KEY: "${SECRET_KEY:-dev-secret-change-me}"
      # Local dev auth bypass — set to "admins" for admin view or "branch-manila" etc.
      # Leave empty (default) to require real Cognito auth.
      DEV_BYPASS_AUTH: "${DEV_BYPASS_AUTH:-}"
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
