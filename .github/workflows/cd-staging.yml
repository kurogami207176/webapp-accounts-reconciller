name: Deploy to Staging

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    name: Build & deploy to staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f api/Dockerfile \
            -t $ECR_REGISTRY/webapp-api:$IMAGE_TAG \
            -t $ECR_REGISTRY/webapp-api:latest \
            api/
          docker push $ECR_REGISTRY/webapp-api:$IMAGE_TAG
          docker push $ECR_REGISTRY/webapp-api:latest

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infra/cloudformation/app-runner.yml \
            --stack-name webapp-api-staging \
            --parameter-overrides \
              "file://infra/cloudformation/parameters/staging.json" \
              "ImageTag=${{ github.sha }}" \
            --capabilities CAPABILITY_IAM \
            --region ${{ vars.AWS_REGION }}
