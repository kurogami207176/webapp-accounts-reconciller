name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d appdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: app

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/appdb
          S3_BUCKET_NAME: ci-test-bucket
          AWS_DEFAULT_REGION: ap-southeast-2
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
          COGNITO_REGION: ap-southeast-2
        run: pytest tests/ -v --cov=. --cov-report=xml
        working-directory: app

      - name: Run migrations (verify schema)
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/appdb
        run: alembic upgrade head
        working-directory: app

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: app/coverage.xml

      - name: Build Docker image (validate)
        run: docker build -t webapp-accounts-reconciller:ci app/
